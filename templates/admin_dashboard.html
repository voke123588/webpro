<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input, textarea, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            background: #003366;
            color: white;
            border: none;
        }
        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }
        th {
            background: #003366;
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Add New Profile</h2>

    <form method="POST" action="/admin/add_profile" enctype="multipart/form-data">
    <input type="text" name="name" placeholder="Name" required>
    <input type="number" name="age" placeholder="Age" required>
    <input type="text" name="city" placeholder="City">
    <input type="text" name="services" placeholder="Services">
    <textarea name="description" placeholder="Description"></textarea>
    <input type="text" name="phone" placeholder="Phone">
    <input type="file" name="image" required>
    <button type="submit">Add Profile</button>
</form>

    <h2>All Profiles</h2>
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
            <th>Phone</th>
        </tr>

        {% for p in profiles %}
        <tr>
            <td>{{ p[1] }}</td>
            <td>{{ p[2] }}</td>
            <td>{{ p[3] }}</td>
            <td>{{ p[6] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
</body>
</html>
