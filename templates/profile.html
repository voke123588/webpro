<!DOCTYPE html>
<html>
<head>
    <title>Profiles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <h1>Premium Escorts</h1>
    <a href="/logout">Logout</a>
    <button onclick="toggleDarkMode()">Dark Mode</button>
</header>

<div style="text-align:center; margin:20px;">
    <form method="GET" action="/search">
        <input type="text" name="city" placeholder="Search by city">
        <button type="submit">Search</button>
    </form>
</div>

<div class="profiles">
    {% for girl in girls %}
    <div class="card">
        <img src="{{ url_for('static', filename='images/' + girl[7]) }}">
        <h3>{{ girl[1] }} ({{ girl[2] }})</h3>
        <p>{{ girl[3] }}</p>
        <p>{{ girl[4] }}</p>
        <a class="call-btn" href="tel:{{ girl[6] }}">Call</a>
    </div>
    {% endfor %}
</div>

<div style="text-align:center; margin:20px;">
    <a href="/payment">
        <button style="padding:15px; background:red; color:white;">
            Unlock Unlimited Escorts (Go Premium)
        </button>
    </a>
</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
