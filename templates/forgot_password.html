<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header>
    <div class="logo">
      <h1>AFROMATCH</h1>
    </div>
  </header>

  <main class="auth-container">
    <div class="form-box">
      <h2 style="text-align: center;">Forgot Password?</h2>
      <p style="text-align: center; margin-bottom: 15px;">Enter your email to reset your password</p>
      
      <form method="POST">
        <input type="email" name="email" placeholder="Your Email" required>
        <button type="submit">Send Reset Link</button>
      </form>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <p class="message" style="text-align: center; color: red;">{{ messages[0] }}</p>
        {% endif %}
      {% endwith %}

      <p style="text-align: center; margin-top: 15px;">
        <a href="{{ url_for('login') }}" style="color: lightblue;">Back to Login</a>
      </p>
    </div>
  </main>
</body>
</html>
